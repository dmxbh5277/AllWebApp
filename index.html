<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Hub</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; height: 100vh; overflow: hidden; }

        /* Sidebar: Mặc định ẩn trên mobile, hiện trên desktop */
        #sidebar { 
            position: absolute; left: -260px; top: 0; bottom: 0; width: 260px; 
            background: #1a252f; color: white; transition: 0.3s; z-index: 100;
        }
        #sidebar.active { left: 0; }
        #sidebar li { padding: 20px; cursor: pointer; border-bottom: 1px solid #2c3e50; }
        
        /* Menu Button */
        #menu-btn { 
            position: fixed; top: 10px; left: 10px; z-index: 101; 
            background: #3498db; color: white; padding: 10px 15px; border-radius: 5px; cursor: pointer;
        }

        #main-container { width: 100%; height: 100vh; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div id="menu-btn" onclick="toggleMenu()">☰ Menu</div>

    <div id="sidebar">
        <ul style="margin-top: 60px;">
            <li onclick="loadTool('https://dmxbh5277.github.io/locpmh/')">Lọc PMH</li>
            <li onclick="loadTool('https://dmxbh5277.github.io/coupon/')">Lọc Coupon</li>
            <li onclick="loadTool('https://dmxbh5277.github.io/BCQ-/')">Báo cáo quy đổi</li>
            <li onclick="loadTool('https://dmxbh5277.github.io/BH/')">Tính Bảo hiểm</li>
        </ul>
    </div>

    <div id="main-container">
        <iframe id="tool-frame" src="about:blank"></iframe>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        function loadTool(url) {
            document.getElementById('tool-frame').src = url;
            // Ẩn menu sau khi chọn
            document.getElementById('sidebar').classList.remove('active');
        }
    </script>
</body>
</html>
