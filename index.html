<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Hub</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; height: 100vh; overflow: hidden; }

        /* Sidebar */
        #sidebar { 
            position: absolute; left: -260px; top: 0; bottom: 0; width: 260px; 
            background: #1a252f; color: white; transition: 0.3s; z-index: 1000;
        }
        #sidebar.active { left: 0; }
        #sidebar li { padding: 20px; cursor: pointer; border-bottom: 1px solid #2c3e50; }
        
        /* Icon 3 gạch - Đã bỏ chữ, làm trong suốt hơn */
        #menu-btn { 
            position: fixed; top: 10px; left: 10px; z-index: 999; 
            font-size: 5px; color: #3498db; cursor: pointer;
            background: rgba(255, 255, 255, 0.3); 
            padding: 5px 5px; border-radius: 5px;
        }

        /* Container chứa web app - Tạo lề trái 50px để chừa chỗ cho icon */
        #main-container { 
            width: 100%; height: 100vh; 
            padding-left: 30px; /* Phần canh lề để không che mất web app */
        }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div id="menu-btn" onclick="toggleMenu()">☰</div>

    <div id="sidebar">
        <ul style="margin-top: 60px;">
            <li onclick="loadTool('https://dmxbh5277.github.io/locpmh/')">Lọc PMH</li>
            <li onclick="loadTool('https://dmxbh5277.github.io/coupon/')">Lọc Coupon</li>
            <li onclick="loadTool('https://dmxbh5277.github.io/BCQ-/')">Báo cáo quy đổi</li>
            <li onclick="loadTool('https://dmxbh5277.github.io/BH/')">Tính Bảo hiểm</li>
        </ul>
    </div>

    <div id="main-container">
        <iframe id="tool-frame" src="https://dmxbh5277.github.io/locpmh/"></iframe>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        function loadTool(url) {
            document.getElementById('tool-frame').src = url;
            document.getElementById('sidebar').classList.remove('active');
        }
    </script>
</body>
</html>
